backend:
  name: git-gateway
  branch: main

# Desenvolupament local (opcional): npx decap-server
local_backend: true

media_folder: "public/images/blog"
public_folder: "/images/blog"

site_url: https://nextleadin.com
display_url: https://nextleadin.com

# Configuració per a l'autenticació
publish_mode: editorial_workflow

collections:
  - name: "blog-ca"
    label: "Blog (Català)"
    folder: "content/blog/ca"
    create: true
    slug: "{{slug}}"
    preview_path: "ca/blog/{{slug}}"
    preview_path_date_field: "date"
    fields:
      - {label: "Títol", name: "title", widget: "string"}
      - {label: "Descripció", name: "description", widget: "text"}
      - {label: "Data de publicació", name: "date", widget: "datetime"}
      - label: "Autor"
        name: "author"
        widget: "select"
        options:
          - { label: "NextLeadIn Team", value: "NextLeadIn Team" }
          - { label: "Laura Sánchez", value: "Laura Sánchez" }
      - {label: "Imatge destacada", name: "image", widget: "image", required: false}
      - {label: "Categories", name: "categories", widget: "list", default: []}
      - {label: "Tags", name: "tags", widget: "list", default: []}
      - {label: "Publicat", name: "published", widget: "boolean", default: true}
      - {label: "Mostrar CTA final", name: "showCTA", widget: "boolean", default: true}
      - {label: "Contingut", name: "body", widget: "markdown"}

  - name: "blog-en"
    label: "Blog (English)"
    folder: "content/blog/en"
    create: true
    slug: "{{slug}}"
    preview_path: "en/blog/{{slug}}"
    preview_path_date_field: "date"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Publication date", name: "date", widget: "datetime"}
      - label: "Author"
        name: "author"
        widget: "select"
        options:
          - { label: "NextLeadIn Team", value: "NextLeadIn Team" }
          - { label: "Laura Sánchez", value: "Laura Sánchez" }
      - {label: "Featured image", name: "image", widget: "image", required: false}
      - {label: "Categories", name: "categories", widget: "list", default: []}
      - {label: "Tags", name: "tags", widget: "list", default: []}
      - {label: "Published", name: "published", widget: "boolean", default: true}
      - {label: "Show CTA at end", name: "showCTA", widget: "boolean", default: true}
      - {label: "Content", name: "body", widget: "markdown"}

  - name: "blog-es"
    label: "Blog (Español)"
    folder: "content/blog/es"
    create: true
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    preview_path_date_field: "date"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descripción", name: "description", widget: "text"}
      - {label: "Fecha de publicación", name: "date", widget: "datetime"}
      - label: "Autor"
        name: "author"
        widget: "select"
        options:
          - { label: "NextLeadIn Team", value: "NextLeadIn Team" }
          - { label: "Laura Sánchez", value: "Laura Sánchez" }
      - {label: "Imagen destacada", name: "image", widget: "image", required: false}
      - {label: "Categorías", name: "categories", widget: "list", default: []}
      - {label: "Etiquetas", name: "tags", widget: "list", default: []}
      - {label: "Publicado", name: "published", widget: "boolean", default: true}
      - {label: "Mostrar CTA final", name: "showCTA", widget: "boolean", default: true}
      - {label: "Contenido", name: "body", widget: "markdown"}
