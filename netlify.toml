[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.18.0"
  NEXT_TELEMETRY_DISABLED = "1"
  PNPM_FLAGS = "--no-frozen-lockfile"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_STRIPE_CANCEL_URL,NEXT_PUBLIC_STRIPE_SUCCESS_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"

# Incloure fitxers de contingut per a funcions serverless
[functions]
  included_files = ["content/**/*"]

# Configuració per DecapCMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Configuració per servir fitxers estàtics
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Headers per fitxers CSS
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Headers per fitxers JS
[[headers]]
  for = "/_next/static/chunks/*"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Headers per fitxers de fonts
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Content-Type = "font/woff2"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers globals
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[plugins]]
  package = "@netlify/plugin-nextjs"


