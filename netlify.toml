[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.18.0"
  NEXT_TELEMETRY_DISABLED = "1"
  PNPM_FLAGS = "--no-frozen-lockfile"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_STRIPE_CANCEL_URL,NEXT_PUBLIC_STRIPE_SUCCESS_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"

# Incloure fitxers de contingut per a funcions serverless
[functions]
  included_files = ["content/**/*"]

# Canonical URL redirects (fix GSC "Page with redirect" indexing)
[[redirects]]
  from = "http://nextleadin.com/*"
  to = "https://nextleadin.com/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.nextleadin.com/*"
  to = "https://nextleadin.com/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://www.nextleadin.com/*"
  to = "https://nextleadin.com/:splat"
  status = 301
  force = true

# Configuració per DecapCMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Configuració per servir fitxers estàtics
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Cache headers per fitxers estàtics de Next.js
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers per pàgines pre-renderitzades (home i locales)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/ca"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/es"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/en"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

# Security headers globals
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[plugins]]
  package = "@netlify/plugin-nextjs"


